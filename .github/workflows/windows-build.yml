name: Windows Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install CMake and Ninja
        run: python -m pip install cmake==4.4.0 ninja

      - name: Install CUDA
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP 'cuda-13.3-installer.exe'
          $cudaPath = 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.3'
          Invoke-WebRequest -Uri 'https://developer.download.nvidia.com/compute/cuda/13.3.0/network_installers/cuda_13.3.0_windows_network.exe' -OutFile $installer
          "CUDA_PATH=$cudaPath" >> $env:GITHUB_ENV
          "$cudaPath\bin" >> $env:GITHUB_PATH
          $process = Start-Process -FilePath $installer -ArgumentList '-s' -Wait -PassThru
          exit $process.ExitCode

      - name: Enter Visual Studio developer environment
        shell: pwsh
        run: |
          $installation = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $developerCommand = Join-Path $installation 'Common7\Tools\VsDevCmd.bat'
          cmd /d /s /c "`"$developerCommand`" -arch=x64 -host_arch=x64 && set" | ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') { "$($matches[1])=$($matches[2])" >> $env:GITHUB_ENV }
          }

      - name: Configure
        run: >-
          cmake -S . -B cmake-build-release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDIFF_SOLVER_BUILD_EXAMPLES=ON
          -DDIFF_SOLVER_BUILD_SPECTRA_PLUGINS=ON

      - name: Build
        run: cmake --build cmake-build-release --parallel 30

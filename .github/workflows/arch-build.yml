name: Arch Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Install build tools
        run: pacman -Syu --noconfirm clang cmake gcc15 git ninja

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install CUDA
        run: pacman -U --noconfirm https://archive.archlinux.org/packages/c/cuda/cuda-13.2.1-3-x86_64.pkg.tar.zst

      - name: Configure
        env:
          CC: clang
          CXX: clang++
          CUDAHOSTCXX: /usr/bin/g++-15
        run: >-
          cmake -S . -B cmake-build-release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CUDA_COMPILER=/opt/cuda/bin/nvcc
          -DCMAKE_CUDA_HOST_COMPILER=/usr/bin/g++-15
          -DCUDAToolkit_ROOT=/opt/cuda
          -DDIFF_SOLVER_BUILD_EXAMPLES=ON
          -DDIFF_SOLVER_BUILD_SPECTRA_PLUGINS=ON

      - name: Build
        run: cmake --build cmake-build-release --parallel 30
